<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rs-trace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      width: 300px;
      min-height: 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .header-title {
      font-weight: 600;
      font-size: 14px;
    }

    .open-link {
      font-size: 11px;
      color: #6366f1;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .open-link:hover { text-decoration: underline; }

    .body { padding: 14px; }

    .state { display: none; }
    .state.active { display: block; }

    .muted { color: #6b7280; font-size: 12px; line-height: 1.5; }

    .paper-url {
      font-size: 11px;
      color: #6b7280;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 12px;
      word-break: break-all;
      line-height: 1.4;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      margin-bottom: 10px;
      appearance: auto;
    }
    select:focus { outline: 2px solid #6366f1; outline-offset: -1px; }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: #6366f1;
      border: 1px solid #e5e7eb;
    }
    .btn-secondary:hover { background: #f9fafb; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #state-loading { text-align: center; padding: 20px 14px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">rs-trace</span>
    <button class="open-link" id="open-app">Open app ↗</button>
  </div>

  <div id="state-loading" class="state active">
    <span class="spinner"></span> Loading…
  </div>

  <div id="state-not-logged-in" class="state">
    <div class="body">
      <p class="muted" style="margin-bottom: 12px;">Sign in to rs-trace to add papers to your projects.</p>
      <button class="btn btn-primary" id="sign-in-btn">Sign in</button>
    </div>
  </div>

  <div id="state-no-paper" class="state">
    <div class="body">
      <p class="muted">No paper detected on this page.</p>
      <p class="muted" style="margin-top: 6px;">Navigate to an arXiv or DOI page to add a paper.</p>
    </div>
  </div>

  <div id="state-add-paper" class="state">
    <div class="body">
      <div class="paper-url" id="paper-url-display"></div>
      <label for="project-select">Add to project</label>
      <select id="project-select"></select>
      <button class="btn btn-primary" id="add-btn">Add paper</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
